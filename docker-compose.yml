version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: llmprop-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llmprop

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    build:
      context: ./worker

    container_name: llmprop-worker

    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres_data: